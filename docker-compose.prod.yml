# Browser Coder - Production Docker Compose for DigitalOcean
# 
# This file uses pre-built images from GitHub Container Registry
# for faster deployments on the production server.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # NGINX - Load Balancer & Static Files
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./security/reports:/usr/share/nginx/reports:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - internal
      - default
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # PREVIEW STORAGE INIT - Fix named-volume permissions
  # ============================================
  preview-storage-init:
    image: busybox:1.36
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /preview-data && chown -R 1001:1001 /preview-data && chmod 770 /preview-data"]
    volumes:
      - browser_coder_previews:/preview-data
    restart: "no"
    networks:
      - internal

  # ============================================
  # API - Uses pre-built image from GHCR
  # ============================================
  api:
    image: ${BROWSER_CODER_IMAGE:-ghcr.io/ninasokolov8/browser-coder:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile.production
    expose:
      - "3001"
    volumes:
      - ./security/reports:/app/security/reports:rw
      - browser_coder_previews:/preview-data:rw
    environment:
      - NODE_ENV=production
      - PORT=3001
      - RATE_LIMIT_MAX=200
      - RUN_TIMEOUT_MS=10000
      - MAX_SCALE=${MAX_SCALE:-8}
      - MAX_CODE_CHARS=750000
      - PREVIEW_STORAGE_DIR=/preview-data
      - PREVIEW_MAX_BYTES=524288
      - PREVIEW_TTL_MS=604800000
      - PREVIEW_CLEANUP_INTERVAL_MS=1800000
      - PREVIEW_MAX_STORAGE_BYTES=1073741824
      - PREVIEW_MAX_FILES=50000
      - PREVIEW_PUBLISHES_PER_MINUTE=10
    depends_on:
      preview-storage-init:
        condition: service_completed_successfully
    # SECURITY: Container-level sandboxing
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /app/sandbox:noexec,nosuid,size=512M,uid=1001,gid=1001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: ${REPLICAS:-2}
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ============================================
  # Autoscaler (Optional - for high traffic)
  # ============================================
  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.autoscaler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SERVICE_NAME=browser_coder-api
      - MIN_REPLICAS=${MIN_REPLICAS:-1}
      - MAX_REPLICAS=${MAX_SCALE:-8}
      - SCALE_UP_CPU_THRESHOLD=70
      - SCALE_DOWN_CPU_THRESHOLD=30
      - CHECK_INTERVAL_SECONDS=10
      - COOLDOWN_SECONDS=30
    depends_on:
      - api
    restart: always
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    profiles:
      - autoscale  # Only runs with: docker compose --profile autoscale up

networks:
  internal:
    driver: bridge
  default:
    driver: bridge

volumes:
  browser_coder_previews:
