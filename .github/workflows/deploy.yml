name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/browser-coder

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Force the working tree to exactly match origin/main. A plain
            # `git pull` fails on any local change or divergence, and because
            # this script previously had no `set -e` it continued anyway and
            # deployed a STALE docker-compose.prod.yml / nginx.conf - so config
            # changes (env vars, client_max_body_size) silently never applied.
            # `reset --hard` guarantees compose + nginx config are current.
            git fetch origin main
            git reset --hard origin/main

            # Pull new images using production compose file (pre-built GHCR image)
            docker compose -f docker-compose.prod.yml pull
            # --force-recreate ensures containers restart with the updated
            # compose env + freshly pulled image, not a cached container.
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            # Cleanup old images
            docker image prune -f
            
            echo "✅ Deployment complete!"
